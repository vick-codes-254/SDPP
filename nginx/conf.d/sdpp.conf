# ════════════════════════════════════════════════════════════════
#  SDPP edge: TLS 1.3 termination, security headers, reverse proxy
# ════════════════════════════════════════════════════════════════

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    # ACME http-01 challenge passthrough (Let's Encrypt) if used.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS 1.3 (with 1.2 fallback), modern ciphers ─────────────
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.3 TLSv1.2;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling (enable with a CA-issued cert):
    # ssl_stapling on; ssl_stapling_verify on;

    # ── Security headers (defense in depth with app middleware) ─
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    limit_conn conn 50;

    # ── API → FastAPI backend ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;   # stream large uploads to the app
    }

    # Stricter rate limit on authentication endpoints.
    location /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # ── Frontend SPA ────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}
