user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging (no sensitive query strings) ────────────────────
    log_format  secure  '$remote_addr - $remote_user [$time_iso8601] '
                        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                        'rt=$request_time';
    access_log  /var/log/nginx/access.log  secure;

    # ── Hardening ───────────────────────────────────────────────
    server_tokens         off;       # don't leak nginx version
    sendfile              on;
    tcp_nopush            on;
    keepalive_timeout     65;
    client_max_body_size  2g;        # large encrypted uploads
    client_body_timeout   60s;
    send_timeout          60s;

    gzip            on;
    gzip_types      application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    # ── Rate limiting (anti brute-force / abuse) ────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    include /etc/nginx/conf.d/*.conf;
}
