# ════════════════════════════════════════════════════════════════
#  SDPP — full stack: PostgreSQL + FastAPI + Frontend + Nginx (TLS)
#  Usage:
#    cp backend/.env.example backend/.env   # then fill secrets
#    ./scripts/gen-dev-certs.sh             # self-signed dev certs
#    docker compose up --build
# ════════════════════════════════════════════════════════════════
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdpp_pw}
      POSTGRES_DB: ${POSTGRES_DB:-sdpp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sdpp} -d ${POSTGRES_DB:-sdpp}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not exposed to the host in production — only the app network reaches it.
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DB hosts to the compose service name.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sdpp}:${POSTGRES_PASSWORD:-sdpp_pw}@db:5432/${POSTGRES_DB:-sdpp}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-sdpp}:${POSTGRES_PASSWORD:-sdpp_pw}@db:5432/${POSTGRES_DB:-sdpp}
      VAULT_STORAGE_PATH: /app/var/vault
    volumes:
      - vault-data:/app/var/vault
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres-data:
  vault-data:
