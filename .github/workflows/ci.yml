name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — lint, type, SAST, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true   # advisory until fully annotated

      - name: SAST (bandit)
        run: bandit -r app -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
        continue-on-error: true   # don't block on upstream advisories

      - name: Tests + coverage
        env:
          APP_ENV: development
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Verify migrations apply (PostgreSQL)
        env:
          DATABASE_URL_SYNC: postgresql+psycopg://sdpp:sdpp_pw@localhost:5432/sdpp
        run: alembic upgrade head

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sdpp
          POSTGRES_PASSWORD: sdpp_pw
          POSTGRES_DB: sdpp
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sdpp" --health-interval 10s
          --health-timeout 5s --health-retries 10

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t sdpp-backend ./backend
